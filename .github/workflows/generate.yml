name: Generate Shorts and Upload
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' # run daily at 01:00 UTC (adjust as needed)
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install ffmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
      - name: Install pip packages
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt
      - name: Run generation script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_and_upload.py --count 1
      - name: Commit metadata back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data -A
          git commit -m "Auto update metadata from generation" || echo "No changes"
          git push origin HEAD:${{ github.ref }}
