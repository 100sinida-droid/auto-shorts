<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>auto-shorts - Recent uploads</title>
  <style>
    body{font-family: Arial, sans-serif; background:#0b0f14; color:#fff; padding:24px}
    .card{background:#0d1418;padding:16px;border-radius:10px;margin-bottom:12px;border:1px solid #162028}
    a{color:#00d4aa}
  </style>
</head>
<body>
  <h1>Latest Generated Shorts</h1>
  <div id="list">Loading...</div>
  <script>
    async function load() {
      const listEl = document.getElementById('list');
      try {
        const r2 = await fetch('/data/latest.json');
        const data = await r2.json();
        listEl.innerHTML = '';
        data.items.forEach(it=>{
          const d = document.createElement('div');
          d.className='card';
          d.innerHTML = `<h3>${it.title}</h3><p><a href="${it.url}" target="_blank">${it.url}</a></p><small>${new Date(it.time*1000).toLocaleString()}</small>`;
          listEl.appendChild(d);
        });
      } catch(e){
        listEl.innerText = 'No data yet. Run generator to create videos.';
      }
    }
    load();
  </script>
</body>
</html>
